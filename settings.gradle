pluginManagement {
    repositories {
        mavenLocal()
        gradlePluginPortal()
    }
}

include 'aio'
include 'core'
include 'devtools'
include 'gradle-plugin'
include 'orchestration'
include 'runtime'

if (!Boolean.parseBoolean(System.getenv('SKIP_SHOWCASE'))) {
    include 'showcase'
}

rootProject.name = 'HotSwapFX'
rootProject.children.each { project ->
    {
        project.projectDir = file("modules/$project.name")
    }
}